appId: com.nomadamas.bananatape
productName: BananaTape
copyright: "Copyright © 2025 NomaDamas"

directories:
  output: dist-electron

files:
  - electron/**/*

asarUnpack:
  - "**/*.node"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!**/.cache"
  - from: .next/standalone/node_modules
    to: standalone/node_modules
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"
  - from: scripts
    to: standalone/scripts
    filter:
      - "*.py"

mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.graphics-design

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Graphics

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
