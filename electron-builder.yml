appId: com.nomadamas.bananatape
productName: BananaTape
copyright: "Copyright © 2025 NomaDamas"

directories:
  output: dist-electron

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

files:
  - electron/**/*

asarUnpack:
  - "**/*.node"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!**/.cache"
      - "!dist-electron/**"
  - from: .next/standalone/node_modules
    to: standalone/node_modules
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"
  - from: scripts
    to: standalone/scripts
    filter:
      - "*.py"

mac:
  identity: null
  target:
    - target: dmg
    - target: zip
  category: public.app-category.graphics-design

win:
  target:
    - target: nsis
    - target: portable

linux:
  maintainer: "NomaDamas <vkehfdl1@gmail.com>"
  target:
    - target: AppImage
    - target: deb
    - target: rpm
  category: Graphics

publish:
  provider: github
  owner: NomaDamas
  repo: bananatape
  releaseType: release

nsis:
  artifactName: "${productName}-${version}-win-${arch}-nsis.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: "${productName}-${version}-win-${arch}-portable.${ext}"
